apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sre-demo-app
  namespace: sre-apps
spec:
  podSelector:
    matchLabels:
      app: sre-demo-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from within the same namespace
    - from:
        - podSelector: {}
    # Allow Prometheus to scrape metrics from sre-monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sre-monitoring
  egress:
    # Allow DNS resolution (needed for any outbound connection)
    - ports:
        - port: 53
          protocol: UDP
    # Allow outbound within the same namespace
    - to:
        - podSelector: {}
